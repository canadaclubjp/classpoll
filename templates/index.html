{% extends "base.html" %}
{% block title %}Classpoll{% endblock %}
{% block content %}
<div class="card">
    <h2 style="margin-bottom:16px;">Polls</h2>
    {% if polls %}
    <ul class="poll-list">
        {% for p in polls %}
        <li>
            <a href="{{ url_for('results', poll_id=p['id']) }}">{{ p['question'] }}</a>
            <a href="{{ url_for('poll', poll_id=p['id']) }}" class="btn btn-blue" style="padding:5px 14px;font-size:0.85rem;">Vote</a>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p style="color:#666;">No polls yet. Create one!</p>
    {% endif %}
    <div style="margin-top:20px;">
        <a href="{{ url_for('create') }}" class="btn btn-blue">+ Create New Poll</a>
    </div>
</div>
{% endblock %}
